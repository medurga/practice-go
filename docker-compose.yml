  #     - KAFKA_DELETE_TOPIC_ENABLE=true
  #     - KAFKA_CREATE_TOPICS=test-2:2:1,test-1:3:1,common-device-cbexternal
  nats:
    container_name: nats
    restart: always
    image: nats:latest
    ports:
      - 4222:4222 # Client Connection
      - 8222:8222 # Monitoring / HTTP
      - 6222:6222 # Cluster routes
    command: >
      -js -DV
    volumes:
      - ./nats-data:/data/jetstream
 
  redis:
    container_name: redis-stack-server
    restart: always
    image: redis/redis-stack-server:latest
    ports:
      - 6379:6379
