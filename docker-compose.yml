# version: '3.9'
services:
  postgres:
    image: postgres:17
    restart: always
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgresdb
    volumes:
      - pgdata:/var/lib/postgresql/data
  # zookeeper:
  #   image: wurstmeister/zookeeper
  #   container_name: zookeeper
